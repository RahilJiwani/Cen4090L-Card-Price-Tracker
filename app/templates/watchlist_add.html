{% extends "base.html" %}

{% block content %}
<h1 class="h5 mb-3">Add to Watchlist</h1>

<div class="card mb-3">
  <div class="card-body">
    <h2 class="h6 mb-1">{{ card.name }}</h2>
    <p class="mb-0 text-muted">
      Set: {{ card.set_code }} &middot;
      Collector #: {{ card.collector_number }} &middot;
      UUID: {{ card.uuid }}
    </p>
  </div>
</div>

<form method="post" class="row g-3">
  <div class="col-md-3">
    <label for="finish" class="form-label">Finish</label>
    <select id="finish" name="finish" class="form-select">
      <option value="normal">Normal</option>
      <option value="foil">Foil</option>
      <option value="etched">Etched</option>
    </select>
  </div>

  <div class="col-md-3">
    <label for="pct_drop_threshold" class="form-label">Drop threshold (%)</label>
    <input
      type="number"
      step="0.1"
      class="form-control"
      id="pct_drop_threshold"
      name="pct_drop_threshold"
      value="15"
      required
    >
  </div>

  <div class="col-md-3">
    <label for="max_price" class="form-label">Max price ($)</label>
    <input
      type="number"
      step="0.01"
      class="form-control"
      id="max_price"
      name="max_price"
      value="40"
      required
    >
  </div>

  <div class="col-md-3">
    <label for="lookback_days" class="form-label">Lookback (days)</label>
    <input
      type="number"
      class="form-control"
      id="lookback_days"
      name="lookback_days"
      value="14"
      required
    >
  </div>

  <div class="col-12">
    <label for="notes" class="form-label">Notes (optional)</label>
    <textarea
      id="notes"
      name="notes"
      class="form-control"
      rows="2"
      placeholder="e.g., Buy a playset if it dips under $30"
    ></textarea>
  </div>

  <div class="col-12 d-flex gap-2">
    <button type="submit" class="btn btn-primary">Save to Watchlist</button>
    <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>
  </div>
</form>
{% endblock %}
