{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body">
        <h1 class="h4 mb-3">Welcome to MTG Price Alerts</h1>
        <p class="text-muted">
          Enter your email to start tracking Magic: The Gathering card price drops.
        </p>
        <form method="post">
          <div class="mb-3">
            <label for="email" class="form-label">Email address</label>
            <input
              type="email"
              class="form-control"
              id="email"
              name="email"
              placeholder="you@example.com"
              required
            >
          </div>
          <button type="submit" class="btn btn-primary">Continue</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
